<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DJ Free App</title>

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="DJ library sync y downloader via SoulSeek + Beatport" />

    <!-- iOS PWA (Safari ignores manifest display mode — needs these tags) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DJ Free App" />
    <link rel="apple-touch-icon" href="/icon-192-v2.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192-v2.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512-v2.png" />

    <!-- Android/Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // ONE-TIME nuke del Service Worker viejo de la PWA. La logica antigua
      // cacheaba bundles pre-2026-05-25 y no se autoactualizaba bien. Esta
      // bandera "sw_nuked_v3" lo unregistra una sola vez por dispositivo,
      // recarga y deja paso al SW nuevo (auto-update). No hace nada en
      // visitas siguientes.
      if ('serviceWorker' in navigator && !localStorage.getItem('sw_nuked_v3')) {
        localStorage.setItem('sw_nuked_v3', '1')
        navigator.serviceWorker.getRegistrations().then((regs) => {
          if (regs.length === 0) return
          return Promise.all(regs.map((r) => r.unregister())).then(() => {
            if ('caches' in window) {
              return caches.keys().then((keys) => Promise.all(keys.map((k) => caches.delete(k))))
            }
          }).then(() => window.location.reload())
        }).catch(() => {})
      }
    </script>
    <script>
      // Register service worker for PWA install support + auto-update.
      // El cliente JAMÁS debería tener que "unregister" o "clear storage"
      // para ver una versión nueva. Esto detecta updates y recarga solo.
      if ('serviceWorker' in navigator) {
        let _reloading = false
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').then((reg) => {
            // Cuando hay un SW nuevo "installed" pero esperando, lo activamos.
            const activateNewWorker = (worker) => {
              if (!worker) return
              worker.addEventListener('statechange', () => {
                if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                  worker.postMessage({ type: 'SKIP_WAITING' })
                }
              })
            }
            // Caso 1: en este momento ya hay uno installing.
            activateNewWorker(reg.installing)
            // Caso 2: un nuevo SW aparece mientras la pestaña está abierta.
            reg.addEventListener('updatefound', () => activateNewWorker(reg.installing))
            // Forzar check periódico (cada 60s) por si el browser no lo hace.
            setInterval(() => { reg.update().catch(() => {}) }, 60000)
          }).catch(() => {})
          // Cuando el SW nuevo toma control, recargar UNA vez para servir
          // los assets nuevos (sin esto el browser sigue mostrando el viejo).
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (_reloading) return
            _reloading = true
            window.location.reload()
          })
        })
      }
    </script>
  </body>
</html>
