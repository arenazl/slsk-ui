<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Groove Sync</title>

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="DJ library sync y downloader via SoulSeek + Beatport" />

    <!-- iOS PWA (Safari ignores manifest display mode — needs these tags) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Groove Sync" />
    <link rel="apple-touch-icon" href="/icon-192-v2.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192-v2.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512-v2.png" />

    <!-- Android/Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker for PWA install support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').catch(() => {})
        })
      }
    </script>
  </body>
</html>
